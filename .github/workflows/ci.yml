name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core (self-test + XCTest)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Self-test (dependency-free)
        run: swift run coldcoach-selftest
      - name: XCTest suite
        run: swift test

  app:
    name: App build (WhisperKit)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build app target
        run: COLDCOACH_BUILD_APP=1 swift build
