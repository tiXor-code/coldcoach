name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core (self-test + XCTest)
    # macos-15 ships Xcode 16 / Swift 6; setup-xcode pins the newest stable
    # toolchain so the Package.swift 6.0 tools-version resolves (macos-14 default
    # is Swift 5.10, which rejects the manifest).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Swift version
        run: swift --version
      - name: Self-test (dependency-free)
        run: swift run coldcoach-selftest
      - name: XCTest suite
        run: swift test

  app:
    name: App build (WhisperKit)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Swift version
        run: swift --version
      - name: Build app target
        run: COLDCOACH_BUILD_APP=1 swift build
